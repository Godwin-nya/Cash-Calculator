<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cash Calculator</title>
    <style>
      /* Quick layout fix to make it look like a neat calculator grid */
      .denomination-row {
        margin-bottom: 10px;
      }
      input {
        width: 80px;
        padding: 5px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Cash Calculator</h1>

    <div class="denomination-row">
      <input type="number" readonly value="200" /> *
      <input
        type="number"
        class="pieces-input"
        data-size="200"
        placeholder="0"
      />
      =
      <input type="number" readonly id="display-200" value="0" />
    </div>

    <div class="denomination-row">
      <input type="number" readonly value="100" /> *
      <input
        type="number"
        class="pieces-input"
        data-size="100"
        placeholder="0"
      />
      =
      <input type="number" readonly id="display-100" value="0" />
    </div>

    <div class="denomination-row">
      <input type="number" readonly value="50" /> *
      <input
        type="number"
        class="pieces-input"
        data-size="50"
        placeholder="0"
      />
      =
      <input type="number" readonly id="display-50" value="0" />
    </div>

    <div class="denomination-row">
      <input type="number" readonly value="20" /> *
      <input
        type="number"
        class="pieces-input"
        data-size="20"
        placeholder="0"
      />
      =
      <input type="number" readonly id="display-20" value="0" />
    </div>

    <div class="denomination-row">
      <input type="number" readonly value="10" /> *
      <input
        type="number"
        class="pieces-input"
        data-size="10"
        placeholder="0"
      />
      =
      <input type="number" readonly id="display-10" value="0" />
    </div>

    <div class="denomination-row">
      <input type="number" readonly value="5" /> *
      <input type="number" class="pieces-input" data-size="5" placeholder="0" />
      =
      <input type="number" readonly id="display-5" value="0" />
    </div>

    <div class="denomination-row">
      <input type="number" readonly value="2" /> *
      <input type="number" class="pieces-input" data-size="2" placeholder="0" />
      =
      <input type="number" readonly id="display-2" value="0" />
    </div>

    <div class="denomination-row">
      <input type="number" readonly value="1" /> *
      <input type="number" class="pieces-input" data-size="1" placeholder="0" />
      =
      <input type="number" readonly id="display-1" value="0" />
    </div>

    <br />
    <button onclick="calculateTotalCash()">Calculate Total Cash</button>

    <div class="total-section">
      <h2>Grand Total: $<span id="grand-total">0</span></h2>
    </div>

    <script>
      function calculateTotalCash() {
        const allPiecesInputs = document.querySelectorAll(".pieces-input");

        let totalSum = 0;
        allPiecesInputs.forEach((input) => {
          const billValue = Number(input.getAttribute("data-size"));
          const pieceCount = Number(input.value) || 0;

          const rowTotal = billValue * pieceCount;

          document.getElementById(`display-${billValue}`).value = rowTotal;
          totalSum += rowTotal;
        });

        document.getElementById("grand-total").textContent = totalSum;
      }
    </script>
  </body>
</html>
